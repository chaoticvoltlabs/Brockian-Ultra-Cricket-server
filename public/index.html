<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sensor Panel UX Server</title>
  <link rel="stylesheet" href="/assets/css/app.css?v=24">
  <script src="/assets/js/app.js?v=24"></script>

  <style>
    :root {
      --bg: #f5f7fb;
      --surface: #ffffff;
      --text: #111111;
      --muted: #4b5563;
      --border: #d7deea;
      --link: #0037cc;
      --link-hover: #002a99;
      --link-visited: #5a189a;
      --focus: #ffbf47;
      --shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      --radius: 16px;
      --max-width: 42rem;
    }

    html {
      font-size: 18px;
      -webkit-text-size-adjust: 100%;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      line-height: 1.6;
    }

    main.home {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 1rem;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1.25rem;
    }

    h1 {
      margin: 0 0 0.5rem;
      font-size: 1.8rem;
      line-height: 1.2;
    }

    p {
      margin: 0 0 1rem;
      color: var(--muted);
    }

    ul {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    li + li {
      margin-top: 0.75rem;
    }

    a {
      display: block;
      padding: 0.9rem 1rem;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fff;
      color: var(--link);
      font-weight: 700;
      text-decoration: underline;
      text-underline-offset: 0.15em;
      text-decoration-thickness: 0.12em;
      transition: background-color 0.15s ease, border-color 0.15s ease, transform 0.15s ease;
    }

    a:visited {
      color: var(--link-visited);
    }

    a:hover {
      color: var(--link-hover);
      background: #f8fbff;
      border-color: #b8c7e6;
      text-decoration-thickness: 0.18em;
      transform: translateY(-1px);
    }

    a:focus,
    a:focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: 3px;
    }

    @media (max-width: 480px) {
      html {
        font-size: 19px;
      }

      main.home {
        padding: 0.75rem;
      }

      .panel {
        padding: 1rem;
        border-radius: 14px;
      }

      h1 {
        font-size: 1.55rem;
      }

      a {
        padding: 1rem;
      }
    }
  </style>
</head>
<body>
  <main class="home">
    <section class="panel" aria-labelledby="page-title">
      <h1 id="page-title">Sensor Panel UX Server</h1>
      <p>UX server is running.</p>

      <ul>
        <li><a href="/ui/device/office_browser">Wind paneel office_browser</a></li>
        <li><a href="/ui/device/climate_browser">Binnenklimaat office_browser</a></li>
        <li><a href="/ui/device/iphone_browser">Wind paneel iphone_browser</a></li>
        <li><a href="/ui/device/climate_iphone_browser">Binnenklimaat iphone_browser</a></li>
        <li><a href="/ui/device/waveshare_hallway">waveshare_hallway</a></li>
      </ul>
    </section>
  </main>
</body>
</html>
